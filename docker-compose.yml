version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: scholarai_mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: scholarai
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scholarai_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=ScholarAI
      - APP_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017
      - DATABASE_NAME=scholarai
      - JWT_SECRET=production_super_secret_jwt_key_scholarai_2026
      - CORS_ORIGINS=["http://localhost", "http://localhost:80", "http://localhost:5173"]
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: scholarai_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
  backend_uploads:
