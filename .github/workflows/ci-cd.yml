name: ScholarAI CI/CD Production Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    name: Backend Validation & Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Python Syntax Compilation Checks
        run: |
          python -m py_compile backend/app/main.py backend/app/services/*.py backend/app/repositories/*.py

      - name: Run Pytest Test Suite
        run: |
          cd backend
          pytest -v

  frontend-build:
    name: Frontend Lint & Production Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Production Bundle
        run: |
          cd frontend
          npm run build

  docker-build:
    name: Production Docker Build Verification
    needs: [backend-test, frontend-build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Build Docker Services
        run: |
          docker compose build
